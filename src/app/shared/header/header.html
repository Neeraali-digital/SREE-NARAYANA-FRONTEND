<!-- Main Header -->
<header class="sticky top-0 z-50 transition-all duration-500"
  [class.py-3]="!isScrolled"
  [class.py-2]="isScrolled"
  [class.bg-brand-burgundy]="isScrolled || !isHomePage"
  [class.shadow-xl]="isScrolled || !isHomePage"
  [class.shadow-brand-burgundy-dark/40]="isScrolled || !isHomePage"
  [class.backdrop-blur-md]="isScrolled || !isHomePage">

  <!-- Transparent gradient when on home hero -->
  <div *ngIf="isHomePage && !isScrolled" class="absolute inset-0 bg-gradient-to-b from-black/40 to-transparent pointer-events-none"></div>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
    <div class="flex justify-between items-center h-16 transition-all duration-300">
      
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center relative z-20">
        <a routerLink="/" class="flex items-center gap-3 group">
          <div class="w-12 h-12 rounded-xl overflow-hidden bg-white/10 flex items-center justify-center p-1 group-hover:bg-white/20 transition-all">
            <img src="SN logo black.png" alt="Sree Narayana Group Logo" class="w-full h-full object-contain brightness-0 invert">
          </div>
          <div class="leading-none">
            <span class="block text-white font-black text-sm uppercase tracking-tight">Sree Narayana</span>
            <span class="block text-brand-gold-light text-[9px] font-bold uppercase tracking-[0.2em]">Group of Institutions</span>
          </div>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center gap-1">
        <a routerLink="/" routerLinkActive="text-brand-gold-light border-b-2 border-brand-gold" [routerLinkActiveOptions]="{exact: true}"
           class="px-5 py-2 text-white/80 hover:text-white text-[11px] font-bold uppercase tracking-widest transition-all border-b-2 border-transparent hover:border-brand-gold-light/50">
          Home
        </a>
        <a routerLink="/about" routerLinkActive="text-brand-gold-light border-b-2 border-brand-gold"
           class="px-5 py-2 text-white/80 hover:text-white text-[11px] font-bold uppercase tracking-widest transition-all border-b-2 border-transparent hover:border-brand-gold-light/50">
          About
        </a>
        <a routerLink="/programs" routerLinkActive="text-brand-gold-light border-b-2 border-brand-gold"
           class="px-5 py-2 text-white/80 hover:text-white text-[11px] font-bold uppercase tracking-widest transition-all border-b-2 border-transparent hover:border-brand-gold-light/50">
          Programs
        </a>
        <a routerLink="/contact" routerLinkActive="text-brand-gold-light border-b-2 border-brand-gold"
           class="px-5 py-2 text-white/80 hover:text-white text-[11px] font-bold uppercase tracking-widest transition-all border-b-2 border-transparent hover:border-brand-gold-light/50">
          Contact
        </a>
      </nav>

      <!-- CTA -->
      <div class="hidden md:flex items-center gap-3">
        <a href="tel:+918129036949" class="flex items-center gap-2 text-white/70 hover:text-brand-gold-light text-[10px] font-bold uppercase tracking-widest transition-colors">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
          Call Us
        </a>
        <button (click)="admissions.openModal()"
          class="px-6 py-2.5 bg-brand-gold text-brand-navy font-black text-[10px] uppercase tracking-widest rounded-lg shadow-lg shadow-brand-gold/20 hover:bg-brand-gold-light hover:shadow-brand-gold/40 transition-all active:scale-95">
          Apply Now
        </button>
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden relative z-20">
        <button (click)="toggleMobileMenu()" type="button"
          class="w-10 h-10 rounded-xl bg-white/10 border border-white/20 flex items-center justify-center text-white hover:bg-white/20 transition-all focus-ring">
          <span class="sr-only">Toggle menu</span>
          <svg *ngIf="!isMobileMenuOpen()" class="block h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="isMobileMenuOpen()" class="block h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
<div *ngIf="isMobileMenuOpen()"
  class="md:hidden fixed inset-0 z-[60] bg-brand-burgundy flex flex-col pt-24 px-8 pb-12">
  
  <!-- Close button -->
  <button (click)="closeMobileMenu()" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white">
    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
  </button>

  <!-- Logo -->
  <div class="mb-10">
    <img src="SN logo black.png" alt="Logo" class="w-14 h-14 object-contain brightness-0 invert">
    <div class="mt-3">
      <span class="block text-white font-black text-lg uppercase tracking-tight">Sree Narayana</span>
      <span class="block text-brand-gold-light text-[10px] font-bold uppercase tracking-widest">Group of Institutions</span>
    </div>
  </div>

  <!-- Nav Links -->
  <div class="flex flex-col space-y-2 flex-grow">
    <a routerLink="/" (click)="closeMobileMenu()"
      class="text-4xl font-black text-white/80 hover:text-brand-gold-light hover:pl-4 transition-all uppercase tracking-tighter py-3 border-b border-white/10">
      Home
    </a>
    <a routerLink="/about" (click)="closeMobileMenu()"
      class="text-4xl font-black text-white/80 hover:text-brand-gold-light hover:pl-4 transition-all uppercase tracking-tighter py-3 border-b border-white/10">
      About
    </a>
    <a routerLink="/programs" (click)="closeMobileMenu()"
      class="text-4xl font-black text-white/80 hover:text-brand-gold-light hover:pl-4 transition-all uppercase tracking-tighter py-3 border-b border-white/10">
      Programs
    </a>
    <a routerLink="/contact" (click)="closeMobileMenu()"
      class="text-4xl font-black text-white/80 hover:text-brand-gold-light hover:pl-4 transition-all uppercase tracking-tighter py-3 border-b border-white/10">
      Contact
    </a>
  </div>

  <!-- Mobile CTA -->
  <div class="mt-8 space-y-4">
    <button (click)="admissions.openModal(); closeMobileMenu()"
      class="block w-full text-center px-6 py-4 font-black text-brand-navy bg-brand-gold rounded-xl shadow-xl uppercase tracking-widest text-sm">
      Apply Now — 2026
    </button>
    <a href="tel:+918129036949"
      class="block w-full text-center px-6 py-4 font-bold text-white border border-white/20 rounded-xl uppercase tracking-widest text-xs bg-white/5">
      Call: +91 8129036949
    </a>
    <p class="text-center text-white/40 text-[10px] uppercase tracking-widest">Admissions Open · RGUHS · INC Recognized</p>
  </div>
</div>
