<header class="fixed w-full z-50 top-0 transition-all duration-500 border-b-0" [class.py-4]="!isScrolled" [class.py-2]="isScrolled" [class.bg-brand-navy/95]="isScrolled || !isHomePage" [class.backdrop-blur-md]="isScrolled || !isHomePage" [class.shadow-lg]="isScrolled || !isHomePage">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16 transition-all duration-300">
      
      <!-- Logo -->
      <div class="flex-shrink-0 flex items-center relative z-20">
        <a routerLink="/" class="text-xl font-black text-white tracking-tighter flex items-center gap-3 group">
          <img src="SN logo black.png" alt="Sree Narayana Logo" class="w-14 h-14 object-contain brightness-0 invert group-hover:scale-105 transition-transform duration-300">
          <span class="leading-none text-sm font-bold uppercase tracking-tight">Sree Narayana Group<br><span class="text-[10px] text-brand-gold">OF INSTITUTIONS</span></span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex space-x-1 items-center bg-white/5 rounded-full px-2 py-1.5 border border-white/10 backdrop-blur-md">
        <a routerLink="/" routerLinkActive="bg-brand-gold text-brand-navy" [routerLinkActiveOptions]="{exact: true}" class="px-5 py-2 rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all font-bold text-[10px] uppercase tracking-widest">Home</a>
        <a routerLink="/about" routerLinkActive="bg-brand-gold text-brand-navy" class="px-5 py-2 rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all font-bold text-[10px] uppercase tracking-widest">About</a>
        <a routerLink="/programs" routerLinkActive="bg-brand-gold text-brand-navy" class="px-5 py-2 rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all font-bold text-[10px] uppercase tracking-widest">Programs</a>
        <a routerLink="/contact" routerLinkActive="bg-brand-gold text-brand-navy" class="px-5 py-2 rounded-full text-white/80 hover:text-white hover:bg-white/10 transition-all font-bold text-[10px] uppercase tracking-widest">Contact</a>
      </nav>

      <div class="hidden md:flex items-center">
         <a routerLink="/contact" class="inline-flex items-center justify-center px-6 py-2.5 overflow-hidden font-bold text-[10px] uppercase tracking-widest text-brand-navy bg-brand-gold rounded-full hover:bg-white transition-all shadow-lg shadow-brand-gold/20 hover:shadow-brand-gold/40 group relative">
          <span class="relative">Apply Now</span>
        </a>
      </div>

      <!-- Mobile menu button -->
      <div class="flex items-center md:hidden relative z-20">
        <button (click)="toggleMobileMenu()" type="button" class="w-10 h-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-600 hover:text-brand-600 transition-colors focus-ring">
          <span class="sr-only">Open main menu</span>
          <svg *ngIf="!isMobileMenuOpen()" class="block h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
          <svg *ngIf="isMobileMenuOpen()" class="block h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu overlay -->
  <div *ngIf="isMobileMenuOpen()" class="md:hidden fixed inset-0 z-10 bg-white/95 backdrop-blur-3xl pt-8 px-6 flex flex-col h-screen overflow-hidden">
    <div class="mb-12">
      <img src="SN logo black.png" alt="Sree Narayana Logo" class="w-16 h-16 object-contain">
    </div>
    <div class="flex flex-col space-y-4">
      <a routerLink="/" (click)="closeMobileMenu()" class="text-3xl font-black text-slate-900 hover:text-brand-600 hover:pl-4 transition-all uppercase tracking-tighter">Home</a>
      <a routerLink="/about" (click)="closeMobileMenu()" class="text-3xl font-black text-slate-900 hover:text-brand-600 hover:pl-4 transition-all uppercase tracking-tighter">About</a>
      <a routerLink="/programs" (click)="closeMobileMenu()" class="text-3xl font-black text-slate-900 hover:text-brand-600 hover:pl-4 transition-all uppercase tracking-tighter">Programs</a>
      <a routerLink="/contact" (click)="closeMobileMenu()" class="text-3xl font-black text-slate-900 hover:text-brand-600 hover:pl-4 transition-all uppercase tracking-tighter">Contact</a>
    </div>
    
    <div class="mt-auto pb-12">
      <a routerLink="/contact" (click)="closeMobileMenu()" class="block w-full text-center px-6 py-4 font-bold text-white bg-brand-600 rounded-2xl shadow-xl shadow-brand-600/20 uppercase tracking-widest">
        Apply Now
      </a>
    </div>
  </div>
</header>
