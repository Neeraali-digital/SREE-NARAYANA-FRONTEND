<div class="flex flex-col min-h-screen">
  <app-header></app-header>
  <main class="flex-grow">
    <router-outlet></router-outlet>
  </main>
  <app-footer></app-footer>
</div>

<!-- Admissions Inquiry Modal Overlay -->
<div *ngIf="admissions.isModalOpen()" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/70 backdrop-blur-md transition-opacity duration-300">
  <!-- Modal Frame -->
  <div class="bg-white rounded-[2rem] overflow-hidden max-w-4xl w-full max-h-[90vh] shadow-2xl flex flex-col md:flex-row relative z-10 border border-slate-100">
    
    <!-- Left panel (Cool College Advertisement) -->
    <div class="md:w-1/2 relative min-h-[300px] md:min-h-full overflow-hidden flex flex-col justify-end p-10 text-white">
      <img src="college_advertisement.png" alt="Sree Narayana Group of Institutions" class="absolute inset-0 w-full h-full object-cover z-0 hover:scale-105 transition-transform duration-[4000ms]">
      <!-- Gradient overlay matching brochure color hues -->
      <div class="absolute inset-0 bg-gradient-to-t from-brand-navy via-brand-navy/60 to-brand-burgundy/20 z-10 mix-blend-multiply"></div>
      <div class="absolute inset-0 bg-gradient-to-t from-slate-950 via-slate-950/40 to-transparent z-10"></div>
      
      <div class="relative z-20 space-y-4">
        <span class="inline-block px-3 py-1 bg-brand-gold text-brand-navy text-[8px] font-black uppercase tracking-widest rounded-full">
          Admissions Open 2026-27
        </span>
        <h4 class="text-3xl font-black leading-none tracking-tighter">
          Shaping the Leaders <br>of <span class="text-brand-gold">Healthcare.</span>
        </h4>
        <p class="text-xs text-white/70 font-light leading-relaxed">
          Guided by Guru's Vision, Committed to Care and Knowledge. Join a network of elite medical professionals.
        </p>
        <!-- Mini motto representation from the flyer -->
        <div class="pt-6 border-t border-white/10 flex gap-4 text-[9px] uppercase tracking-widest font-black text-white/50">
          <span>Humanity</span>
          <span>•</span>
          <span>Education</span>
          <span>•</span>
          <span>Purpose</span>
        </div>
      </div>
    </div>

    <!-- Right panel (Admissions Inquiry Form) -->
    <div class="md:w-1/2 p-8 md:p-12 overflow-y-auto flex flex-col justify-center bg-white relative">
      <!-- Close button -->
      <button (click)="admissions.closeModal()" class="absolute top-6 right-6 w-8 h-8 rounded-full border border-slate-100 flex items-center justify-center text-slate-400 hover:text-brand-burgundy hover:border-brand-burgundy/30 transition-all focus:outline-none" title="Close modal">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="mb-8">
        <h3 class="text-2xl font-black text-slate-900 tracking-tight">Admissions Enquiry</h3>
        <p class="text-xs text-slate-500 font-light mt-1">Submit this form and an admissions counselor will connect with you.</p>
      </div>

      <form class="space-y-6">
        <div>
          <label class="block text-[9px] font-black uppercase tracking-wider text-brand-navy/60 mb-2">Full Name</label>
          <input type="text" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-light text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-brand-gold transition-all" placeholder="Enter your name">
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
          <div>
            <label class="block text-[9px] font-black uppercase tracking-wider text-brand-navy/60 mb-2">Email Address</label>
            <input type="email" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-light text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-brand-gold transition-all" placeholder="name@email.com">
          </div>
          <div>
            <label class="block text-[9px] font-black uppercase tracking-wider text-brand-navy/60 mb-2">Mobile Number</label>
            <input type="tel" required class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-light text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-brand-gold transition-all" placeholder="+91 XXXXX XXXXX">
          </div>
        </div>

        <div>
          <label class="block text-[9px] font-black uppercase tracking-wider text-brand-navy/60 mb-2">Desired Course / Track</label>
          <select class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-light text-slate-700 bg-white appearance-none cursor-pointer focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-brand-gold transition-all">
            <option value="">Select a Program</option>
            <option value="gnm">G.N.M (General Nursing & Midwifery)</option>
            <option value="bsc_nursing">B.Sc. Nursing</option>
            <option value="pb_nursing">PB.B.Sc. Nursing</option>
            <option value="msc_nursing">M.Sc. Nursing</option>
            <option value="bpt">BPT (Bachelor of Physiotherapy)</option>
            <option value="at_ot">B.Sc. (AT & OT)</option>
            <option value="mit">B.Sc. MIT (Medical Imaging Tech)</option>
            <option value="optometry">B.Sc. Optometry</option>
          </select>
        </div>

        <div>
          <label class="block text-[9px] font-black uppercase tracking-wider text-brand-navy/60 mb-2">Inquiry message</label>
          <textarea rows="2" class="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-light text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-gold focus:border-brand-gold transition-all" placeholder="Any specific questions regarding course, eligibility, or fees..."></textarea>
        </div>

        <button type="button" (click)="admissions.closeModal()" class="w-full bg-brand-burgundy hover:bg-brand-burgundy-dark text-white font-black uppercase tracking-widest text-xs py-4 rounded-xl shadow-xl transition-all hover:shadow-brand-burgundy/20 active:scale-95 duration-200">
          Submit Admissions Inquiry
        </button>
      </form>
    </div>

  </div>
</div>
