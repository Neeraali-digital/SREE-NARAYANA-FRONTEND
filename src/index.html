<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Sree Narayana Group of Institutions</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="SN Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&display=swap" rel="stylesheet">
</head>
<body>
  <app-root>
    <div style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #ffffff; overflow: hidden; margin: 0; padding: 0;">
      <img src="SN logo black.png" alt="Sree Narayana Logo" style="display: block; width: 120px; height: auto; margin: 0 auto 30px auto; animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;">
      <div style="display: block; margin: 0 auto; width: 48px; height: 48px; border: 4px solid #f1f5f9; border-top-color: #7A1A40; border-radius: 50%; animation: spin 1s linear infinite;"></div>
      <p style="margin: 16px auto 0 auto; text-align: center; font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; color: rgba(4, 21, 37, 0.6); font-family: 'Inter', sans-serif;">Loading</p>
    </div>
    <style>
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
  </app-root>
</body>
</html>
